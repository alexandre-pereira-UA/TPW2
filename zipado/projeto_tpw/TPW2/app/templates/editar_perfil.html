{% extends "layout.html" %}
{% block content %}
<div class="container" style="margin-top: 50px; max-width: 600px;">
    <div class="movie-card" style="background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333;">
        <h2 style="color: #f5c518; margin-bottom: 30px;">Editar Dados do Perfil</h2>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group mb-3">
                <label>Nome de Utilizador:</label>
                <input type="text" name="username" class="form-control" value="{{ perfil_user.username }}">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label>Primeiro Nome:</label>
                    <input type="text" name="first_name" class="form-control" value="{{ perfil_user.first_name }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label>Último Nome:</label>
                    <input type="text" name="last_name" class="form-control" value="{{ perfil_user.last_name }}">
                </div>
            </div>

            <div class="form-group mb-4">
                <label>E-mail:</label>
                <input type="email" name="email" class="form-control" value="{{ perfil_user.email }}">
            </div>
            {% if not perfil_user.is_superuser %}
            <div class="form-group mb-4">
                <label>Nova Palavra-Passe (deixe vazio para não alterar):</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••"
                       style="background: #2a2a2a; color: white; border: 1px solid #444;">
            </div>
            {% endif %}

            {% if request.user.is_superuser %}
            <div style="border-top: 1px solid #333; padding-top: 20px; margin-top: 10px; margin-bottom: 20px;">
                <label>Gerir Grupo:</label>
                <select name="grupo" class="form-control" style="background: #2a2a2a; color: white; border: 1px solid #444;">
                    <option value="">-- Sem Grupo / Utilizador Comum --</option>
                    {% for g in grupos %}
                        <option value="{{ g.id }}" {% if g in perfil_user.groups.all %} selected {% endif %}>
                            {{ g.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn btn-warning" style="flex: 1; font-weight: bold; border-radius: 50px;">
                    Guardar Alterações
                </button>
                <a href="javascript:history.back()" class="btn-voltar-custom" style="flex: 1; justify-content: center;">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
