{% extends "layout.html" %}
{% load static %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

<div class="movie-card" style="max-width: 700px; margin: 30px auto; background: #1a1a1a; padding: 40px; border-radius: 15px;">
    <h1>{% if editando %}Editar Filme: {{ form.instance.titulo }}{% else %}Adicionar Novo Filme{% endif %}</h1>
    <hr style="border-color: #333; margin-bottom: 30px;">

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <div style="display: flex; gap: 15px; margin-top: 40px;">
«            <button type="submit" class="btn btn-warning" style="flex: 2; border-radius: 50px; font-weight: bold; padding: 12px;">
                <i class="fas fa-save"></i> Guardar Filme
            </button>

            <a href="javascript:history.back()" class="btn-voltar-custom" style="flex: 1; justify-content: center;">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="{% static 'content/script.js' %}"></script>
{% endblock %}
