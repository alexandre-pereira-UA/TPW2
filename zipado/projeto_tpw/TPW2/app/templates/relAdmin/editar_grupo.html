{% extends "relAdmin/admin_base_gestao.html" %}

{% block content %}
<style>
    body, .content-wrapper, .edit-container {
        background-color: #121212 !important;
        color: white !important;
    }

    .form-card {
        background-color: #1e1e1e !important;
        border: 1px solid #333 !important;
        padding: 25px;
        border-radius: 8px;
    }

    .form-control {
        background-color: #2a2a2a !important;
        border: 1px solid #444 !important;
        color: white !important;
    }

    .permissions-scroll {
        max-height: 400px;
        overflow-y: auto;
        background: #252525;
        padding: 15px;
        border: 1px solid #444;
        border-radius: 4px;
    }

    .permission-item {
        padding: 5px 0;
        border-bottom: 1px solid #333;
        display: flex;
        align-items: center;
    }

    .permission-item input {
        margin-right: 10px;
        accent-color: #ffc107;
    }

    .btn-guardar-admin {
        background-color: #ffc107 !important;
        color: #000 !important;
        border: none !important;
        padding: 10px 25px !important;
        border-radius: 4px !important;
        font-weight: bold !important;
        display: inline-flex;
        align-items: center;
        margin-right: 10px;
    }

    .btn-cancelar-dark {
        background-color: #333 !important;
        color: white !important;
        border: none !important;
        padding: 10px 25px !important;
        border-radius: 4px !important;
        font-weight: bold !important;
        display: inline-flex;
        align-items: center;
        text-decoration: none !important;
    }
</style>

<div class="edit-container" style="padding-top: 20px;">

    <div style="margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 15px;">
        <h2 style="color: white !important; margin-bottom: 5px;">{{ modo }} Grupo</h2>
        <div style="color: #888; font-size: 0.9em;">
            Painel Administrativo > Grupos > <span style="color: #ffc107;">{{ modo }}</span>
        </div>
    </div>

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}

            <div class="form-group mb-4">
                <label style="color: white !important; font-weight: bold; display: block; margin-bottom: 10px;">
                    Nome do Grupo:
                </label>
                <input type="text" name="nome" class="form-control"
                       value="{{ grupo.name }}" placeholder="Ex: Moderadores, Editores..." required>
            </div>

            <div class="form-group mb-4">
                <label style="color: white !important; font-weight: bold; display: block; margin-bottom: 10px;">
                    Atribuir Permissões:
                </label>
                <div class="permissions-scroll">
                    {% for perm in todas_permissoes %}
                    <div class="permission-item">
                        <input type="checkbox" name="permissoes" value="{{ perm.id }}" id="perm_{{ perm.id }}"
                            {% if perm in grupo.permissions.all %} checked {% endif %}>
                        <label for="perm_{{ perm.id }}" style="margin: 0; cursor: pointer; font-size: 0.9em;">
                            <strong>{{ perm.content_type.model|capfirst }}</strong> | {{ perm.name }}
                        </label>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div style="display: flex; align-items: center; margin-top: 30px;">
                <button type="submit" class="btn-guardar-admin">
                    <i class="fas fa-save" style="margin-right: 8px;"></i> Guardar Grupo
                </button>

                <a href="{% url 'lista_grupos' %}" class="btn-cancelar-dark">
                    <i class="fas fa-times" style="margin-right: 8px;"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
