{% extends "relAdmin/admin_base_gestao.html" %}

{% block content %}
<style>
    body, .content-wrapper, .main-footer, .edit-container {
        background-color: #121212 !important;
        color: white !important;
    }

    .form-card {
        background-color: #1e1e1e !important;
        border: 1px solid #333 !important;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .form-control {
        background-color: #2a2a2a !important;
        border: 1px solid #444 !important;
        color: white !important;
    }

    .form-control:focus {
        background-color: #333 !important;
        border-color: #ffc107 !important;
        color: white !important;
    }

    .btn-guardar-admin {
        background-color: #ffc107 !important;
        color: #000 !important;
        border: none !important;
        padding: 10px 25px !important;
        border-radius: 4px !important;
        font-weight: bold !important;
        display: inline-flex;
        align-items: center;
        margin-right: 10px;
        cursor: pointer;
    }

    .btn-cancelar-dark {
        background-color: #333 !important;
        color: white !important;
        border: none !important;
        padding: 10px 25px !important;
        border-radius: 4px !important;
        font-weight: bold !important;
        display: inline-flex;
        align-items: center;
        text-decoration: none !important;
    }

    .btn-cancelar-dark:hover {
        background-color: #444 !important;
        color: white !important;
    }

    .breadcrumb-text {
        color: #888 !important;
        font-size: 0.9em;
    }
</style>

<div class="edit-container" style="padding-top: 20px;">

    <div style="margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 15px;">
        <h2 style="color: white !important; margin-bottom: 5px;">{{ modo }} {{ tipo|capfirst }}</h2>
        <div class="breadcrumb-text">
            Painel Administrativo > {{ tipo|capfirst }}s > <span style="color: #ffc107;">{{ modo }}</span>
        </div>
    </div>

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}

            <div class="form-group mb-4">
                <label style="color: white !important; font-weight: bold; display: block; margin-bottom: 10px;">
                    Nome do {{ tipo|capfirst }}:
                </label>
                <input type="text" name="nome" class="form-control"
                       value="{% if item %}{{ item.nome }}{% endif %}"
                       placeholder="Introduza o nome aqui..." required>
            </div>

            <div style="display: flex; flex-direction: row; align-items: center; gap: 10px; margin-top: 30px;">
                <button type="submit" class="btn-guardar-admin">
                    <i class="fas fa-save" style="margin-right: 8px;"></i> Guardar Alterações
                </button>

                <a href="javascript:history.back()" class="btn-cancelar-dark">
                    <i class="fas fa-times" style="margin-right: 8px;"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
