<div class="movie-card" style="max-width: 450px; margin: 50px auto; background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333; color: white;">
    <h2 class="section-title" style="color: #f5c518">Criar Conta - MOVIEZ</h2>

    @if (errorMessage) {
        <div class="alert alert-danger" style="margin-bottom: 20px; font-weight: bold; border-radius: 8px;">
            {{ errorMessage }}
        </div>
    }

    <form (submit)="onSubmit(); $event.preventDefault();">
        <div class="form-group mb-3">
            <label style="color: #ccc;">Username:</label>
            <input type="text" [(ngModel)]="username" name="username" class="form-control" style="background: #2a2a2a; color: white; border: 1px solid #444;" required>
        </div>

        <div class="row" style="margin: 0;">
            <div class="col-md-6 form-group mb-3" style="padding-left: 0; padding-right: 5px;">
                <label style="color: #ccc;">Primeiro Nome:</label>
                <input type="text" [(ngModel)]="first_name" name="first_name" class="form-control" style="background: #2a2a2a; color: white; border: 1px solid #444;" required>
            </div>
            <div class="col-md-6 form-group mb-3" style="padding-right: 0; padding-left: 5px;">
                <label style="color: #ccc;">Último Nome:</label>
                <input type="text" [(ngModel)]="last_name" name="last_name" class="form-control" style="background: #2a2a2a; color: white; border: 1px solid #444;" required>
            </div>
        </div>

        <div class="form-group mb-3">
            <label style="color: #ccc;">E-mail:</label>
            <input type="email" [(ngModel)]="email" name="email" class="form-control" style="background: #2a2a2a; color: white; border: 1px solid #444;" required>
        </div>

        <div class="form-group mb-4">
            <label style="color: #ccc;">Password:</label>
            <input type="password" [(ngModel)]="password" name="password" class="form-control" style="background: #2a2a2a; color: white; border: 1px solid #444;" required>
        </div>

        <button type="submit" class="btn btn-warning btn-block" style="background-color: #f5c518; color: black; font-weight: bold; border-radius: 50px; width: 100%; padding: 10px;">
            Registar
        </button>
    </form>

    <p style="font-family: sans-serif; font-size: 14px; margin-top: 20px; text-align: center; color: #888;">
        Já tem conta?
        <a routerLink="/login" style="color: #f5c518; text-decoration: none; font-weight: bold;">
            Inicie sessão aqui
        </a>
    </p>
</div>
