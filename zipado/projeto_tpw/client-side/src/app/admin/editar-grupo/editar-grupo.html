<div class="container edit-container" style="padding-top: 20px; color: white;">
    <div style="margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 15px;">
        <h2 style="color: white !important; margin-bottom: 5px;">{{ modo }} Grupo</h2>
        <div style="color: #888; font-size: 0.9em;">
            Painel Administrativo > Grupos > <span style="color: #ffc107; font-weight: bold;">{{ modo }}</span>
        </div>
    </div>

    <div class="form-card" style="background-color: #1e1e1e; border: 1px solid #333; padding: 25px; border-radius: 8px;">
        <form (submit)="onSubmit(); $event.preventDefault();">
            <div class="form-group mb-4">
                <label style="color: white !important; font-weight: bold; display: block; margin-bottom: 10px;">
                    Nome do Grupo:
                </label>
                <input type="text" [(ngModel)]="nome" name="nome" class="form-control"
                       placeholder="Ex: Moderadores, Editores..." style="background-color: #2a2a2a; border: 1px solid #444; color: white;" required>
            </div>

            <div class="form-group mb-4">
                <label style="color: white !important; font-weight: bold; display: block; margin-bottom: 10px;">
                    Atribuir Permissões:
                </label>
                <div class="permissions-scroll" style="max-height: 400px; overflow-y: auto; background: #252525; padding: 15px; border: 1px solid #444; border-radius: 4px;">
                    @for (perm of todasPermissoes; track perm.id) {
                        <div class="permission-item" style="padding: 5px 0; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px;">
                            <input type="checkbox" [checked]="isPermissaoSelecionada(perm.id)" (change)="togglePermissao(perm.id, $event)" id="perm_{{ perm.id }}" style="accent-color: #ffc107;">
                            <label for="perm_{{ perm.id }}" style="margin: 0; cursor: pointer; font-size: 0.9em; color: #ccc;">
                                <strong>{{ perm.content_type_model | titlecase }}</strong> | {{ perm.name }}
                            </label>
                        </div>
                    } @empty {
                        <p style="color: #888; margin: 0;">A carregar permissões do sistema...</p>
                    }
                </div>
            </div>

            <div style="display: flex; align-items: center; margin-top: 30px; gap: 15px;">
                <button type="submit" class="btn btn-warning" style="background-color: #ffc107; color: #000; border: none; padding: 10px 25px; border-radius: 4px; font-weight: bold; display: inline-flex; align-items: center;">
                    <i class="fas fa-save" style="margin-right: 8px;"></i> Guardar Grupo
                </button>

                <a routerLink="/admin/grupos" class="btn-cancelar-dark" style="background-color: #333; color: white; border: none; padding: 10px 25px; border-radius: 4px; font-weight: bold; display: inline-flex; align-items: center; text-decoration: none;">
                    <i class="fas fa-times" style="margin-right: 8px;"></i> Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
