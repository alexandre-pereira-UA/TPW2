<div class="movie-card" style="max-width: 400px; margin: 50px auto; background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333; color: white;">
    <h2 class="section-title" style="color: #f5c518; text-align: center; margin-bottom: 25px;">Login - MOVIEZ</h2>

    @if (errorMessage) {
        <div class="alert alert-danger" style="margin-bottom: 20px; font-weight: bold; border-radius: 8px;">
            {{ errorMessage }}
        </div>
    }

    <form (submit)="onSubmit(); $event.preventDefault();">
        <div class="form-group mb-3">
            <label style="color: #ccc;">Username:</label>
            <input type="text" [(ngModel)]="username" name="username" class="form-control" style="background: #2a2a2a; color: white; border: 1px solid #444;" required>
        </div>

        <div class="form-group mb-4">
            <label style="color: #ccc;">Password:</label>
            <input type="password" [(ngModel)]="password" name="password" class="form-control" style="background: #2a2a2a; color: white; border: 1px solid #444;" required>
        </div>

        <button type="submit" class="btn btn-warning btn-block" style="background-color: #f5c518; color: black; font-weight: bold; border-radius: 50px; width: 100%; padding: 10px;">
            Entrar
        </button>
    </form>

    <p style="font-family: sans-serif; font-size: 14px; margin-top: 20px; text-align: center; color: #888;">
        Não tem conta?
        <a routerLink="/registo" style="color: #f5c518; text-decoration: none; font-weight: bold;">
            Registe-se aqui
        </a>
    </p>
</div>
